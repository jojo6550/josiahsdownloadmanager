<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDM</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Titlebar / drag region -->
    <header id="titlebar">
      <span id="logo">JDM</span>
      <div id="stats-bar">
        <span id="stat-speed">0 B/s</span>
        <span id="stat-active">·</span>
      </div>
      <div id="win-controls">
        <button id="btn-minimize" title="Minimize">─</button>
        <button id="btn-close"    title="Close">✕</button>
      </div>
    </header>

    <!-- URL input -->
    <div id="input-row">
      <input
        type="text"
        id="urlInput"
        placeholder="Paste URL…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="downloadBtn" title="Download">↓</button>
    </div>

    <!-- Download list -->
    <div id="dl-list">
      <div id="downloads-active"></div>
      <div id="downloads-done"></div>
    </div>

  </div>
  <!-- Quality picker modal -->
  <div id="quality-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <span>Select Quality</span>
        <button id="modal-close" class="btn-xs">✕</button>
      </div>
      <div id="modal-formats" class="modal-formats"></div>
      <div class="modal-footer">
        <button id="modal-download" class="btn-primary">Download</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
